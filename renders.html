<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Renders | ANDROARQ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: #0a0a0a;
            font-family: 'Montserrat', sans-serif;
            color: #fff;
        }

        /* HERO SOLO PARA ESTA PÁGINA */
        .hero-renders {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero-content h1 {
            font-size: 8rem;
            letter-spacing: 6px;
            color: #ffffff;
        }

        .hero-small {
            font-size: 0.8rem;
            letter-spacing: 4px;
            color: #aaa;
        }

        .hero-sub {
            font-size: 0.9rem;
            color: #777;
        }

        /* GALERÍA */
        .galeria {
            padding: 80px 10%;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .item img {
            width: 100%;
            display: block;
        }
        /* SLIDER */
.slider-section {
    padding: 100px 0;
}

.slider-container {
    position: relative;
    width: 90%;
    margin: auto;
    overflow: hidden;
}

.slider {
    display: flex;
    gap: 20px;
    overflow-x: auto;
    scroll-behavior: smooth;
}

.slider img {
    min-width: 400px;
    height: 250px;
    object-fit: cover;
    transition: 0.4s;
    border-radius: 5px;
}

.slider img:hover {
    transform: scale(1.05);
}

/* BOTONES */
.nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.6);
    border: none;
    color: white;
    font-size: 2rem;
    padding: 10px 15px;
    cursor: pointer;
    z-index: 2;
}

.prev {
    left: 10px;
}

.next {
    right: 10px;
}
    </style>
</head>

<body>

    <section class="hero-renders">
        <div class="hero-content">
            <p class="hero-small">ANDROARQ</p>
            <h1>RENDERS</h1>
            <p class="hero-sub">Visualización arquitectónica</p>
        </div>
    </section>
<section class="slider-section">

    <div class="slider-container">
        
        <button class="nav prev">&#10094;</button>

        <div class="slider" id="slider">
            <img src="img/render1.jpg">
            <img src="img/render2.jpg">
            <img src="img/render3.jpg">
            <img src="img/render4.jpg">
            <img src="img/render5.jpg">
        </div>

        <button class="nav next">&#10095;</button>

    </div>

</section>
    <section class="galeria">
        <div class="grid">
            <div class="item"><img src="img/render1.jpg"></div>
            <div class="item"><img src="img/render2.jpg"></div>
            <div class="item"><img src="img/render3.jpg"></div>
        </div>
    </section>
<script>
    const slider = document.getElementById('slider');

    document.querySelector('.next').addEventListener('click', () => {
        slider.scrollBy({ left: 400, behavior: 'smooth' });
    });

    document.querySelector('.prev').addEventListener('click', () => {
        slider.scrollBy({ left: -400, behavior: 'smooth' });
    });
</script>
</body>
</html>
