<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Renders | ANDROARQ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:#0a0a0a;
    font-family:'Montserrat',sans-serif;
    color:#fff;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}
.hero h1{
    font-size:7rem;
    letter-spacing:6px;
    color:#fff;
}
.hero p{
    color:#777;
}

/* SLIDER APPLE STYLE */
.slider-section{
    padding:80px 0;
}

.slider{
    display:flex;
    gap:40px;
    overflow-x:auto;
    scroll-snap-type:x mandatory;
    padding:40px;
}

.slider::-webkit-scrollbar{
    display:none;
}

.slide{
    flex:0 0 60%;
    scroll-snap-align:center;
    transition:0.5s;
    cursor:pointer;
}

.slide img{
    width:100%;
    height:400px;
    object-fit:cover;
    border-radius:10px;
    transition:0.5s;
}

.slide:hover{
    transform:scale(1.05);
}

/* LIGHTBOX */
.lightbox{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.95);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.lightbox img{
    max-width:90%;
    max-height:90%;
}

.close{
    position:absolute;
    top:30px;
    right:40px;
    font-size:2rem;
    cursor:pointer;
}

/* RESPONSIVE */
@media(max-width:768px){
    .hero h1{
        font-size:3.5rem;
    }

    .slide{
        flex:0 0 80%;
    }

    .slide img{
        height:250px;
    }
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
    <div>
        <h1>RENDERS</h1>
        <p>Visualización arquitectónica</p>
    </div>
</section>

<!-- SLIDER -->
<section class="slider-section">
    <div class="slider">

        <div class="slide"><img src="RENDERS/01.png"></div>
        <div class="slide"><img src="RENDERS/02.png"></div>
        <div class="slide"><img src="RENDERS/03.png"></div>
        <div class="slide"><img src="RENDERS/04.png"></div>
        <div class="slide"><img src="RENDERS/05.png"></div>
        <div class="slide"><img src="RENDERS/06.jpg"></div>
        <div class="slide"><img src="RENDERS/07.jpg"></div>
        <div class="slide"><img src="RENDERS/08.jpg"></div>
        <div class="slide"><img src="RENDERS/09.jpg"></div>
        <div class="slide"><img src="RENDERS/10.png"></div>
        <div class="slide"><img src="RENDERS/11.jpg"></div>
        <div class="slide"><img src="RENDERS/12.jpg"></div>
        <div class="slide"><img src="RENDERS/13.png"></div>

    </div>
</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
    <span class="close" onclick="closeLightbox()">✕</span>
    <img id="lightbox-img">
</div>

<script>
const slides = document.querySelectorAll('.slide img');
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');

slides.forEach(img=>{
    img.addEventListener('click',()=>{
        lightbox.style.display='flex';
        lightboxImg.src = img.src;
    });
});

function closeLightbox(){
    lightbox.style.display='none';
}
</script>

</body>
</html>
