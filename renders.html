<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Renders | ANDRO ARQ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display+SC&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#0b0b0b;
  color:#eee;
  font-family:'Inter', sans-serif;
}

/* HEADER */
.header{
  text-align:center;
  padding:80px 20px 40px;
}

.header h1{
  font-family:'Playfair Display SC', serif;
  font-size:120px;
  letter-spacing:6px;
  color:#c75a56;
  margin:0;
}

/* BACK */
.top-link{
  text-align:center;
  margin-bottom:60px;
}

.top-link a{
  color:#aaa;
  text-decoration:none;
  border-bottom:1px solid #555;
}

/* GALERÍA */
.gallery{
  column-count:3;
  column-gap:30px;
  max-width:1200px;
  margin:auto;
  padding:0 20px;
}

.item{
  margin-bottom:30px;
  break-inside:avoid;
  cursor:pointer;
}

.item img{
  width:100%;
  border-radius:4px;
  transition:.4s;
}

.item:hover img{
  transform:scale(1.03);
}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  display:none;
  align-items:center;
  justify-content:center;
}

.lightbox img{
  max-width:90%;
  max-height:90%;
}

@media(max-width:800px){
  .gallery{ column-count:1; }
  .header h1{ font-size:60px; }
}
</style>
</head>

<body>

<div class="header">
<h1>RENDERS</h1>
</div>

<div class="top-link">
<a href="index.html">← Volver</a>
</div>

<div class="gallery">

<div class="item"><img src="proyectos/RENDERS/01.jpg"></div>
<div class="item"><img src="proyectos/RENDERS/02.jpg"></div>
<div class="item"><img src="proyectos/RENDERS/03.jpg"></div>
<div class="item"><img src="proyectos/RENDERS/04.jpg"></div>

<div class="item"><img src="proyectos/RENDERS/BAÑO.png"></div>
<div class="item"><img src="proyectos/RENDERS/DORMITORIO1.png"></div>
<div class="item"><img src="proyectos/RENDERS/DORMITORIO2.png"></div>

<div class="item"><img src="proyectos/RENDERS/SALA.png"></div>
<div class="item"><img src="proyectos/RENDERS/SALA2.png"></div>

</div>

<div class="lightbox" id="lightbox">
<img id="imgBox">
</div>

<script>
const items = document.querySelectorAll('.item img');
const box = document.getElementById('lightbox');
const imgBox = document.getElementById('imgBox');

items.forEach(i=>{
  i.onclick=()=>{
    box.style.display='flex';
    imgBox.src=i.src;
  }
});

box.onclick=()=>{
  box.style.display='none';
};
</script>

</body>
</html>
