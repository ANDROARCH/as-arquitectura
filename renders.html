<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Renders | ANDROARQ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:#0a0a0a;
    font-family:'Montserrat',sans-serif;
    color:#fff;
    overflow-x:hidden;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}
.hero h1{
    font-size:7rem;
    letter-spacing:6px;
    color:#fff;
}
.hero p{
    color:#777;
}

/* SLIDER PRO */
.slider-section{
    padding:80px 0;
}

.slider{
    display:flex;
    gap:40px;
    overflow-x:auto;
    scroll-snap-type:x mandatory;
    padding:40px;
}

.slider::-webkit-scrollbar{
    display:none;
}

.slide{
    flex:0 0 60%;
    scroll-snap-align:center;
    transition:0.5s;
    position:relative;
}

.slide img{
    width:100%;
    height:420px;
    object-fit:cover;
    border-radius:12px;
    transition:0.5s;
    cursor:pointer;
}

/* EFECTO ENFOQUE */
.slide{
    opacity:0.4;
    filter:blur(2px);
    transform:scale(0.9);
}

.slide.active{
    opacity:1;
    filter:blur(0);
    transform:scale(1);
}

/* LIGHTBOX */
.lightbox{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.95);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.lightbox img{
    max-width:90%;
    max-height:90%;
}

.close{
    position:absolute;
    top:30px;
    right:40px;
    font-size:2rem;
    cursor:pointer;
}

/* RESPONSIVE */
@media(max-width:768px){
    .hero h1{
        font-size:3.5rem;
    }

    .slide{
        flex:0 0 80%;
    }

    .slide img{
        height:250px;
    }
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
    <div>
        <h1>RENDERS</h1>
        <p>Visualización arquitectónica</p>
    </div>
</section>

<!-- SLIDER -->
<section class="slider-section">
    <div class="slider" id="slider">

        <!-- DUPLICAMOS PARA LOOP -->
        <!-- ORIGINAL -->
        <div class="slide"><img src="RENDERS/01.png"></div>
        <div class="slide"><img src="RENDERS/02.png"></div>
        <div class="slide"><img src="RENDERS/03.png"></div>
        <div class="slide"><img src="RENDERS/04.png"></div>
        <div class="slide"><img src="RENDERS/05.png"></div>
        <div class="slide"><img src="RENDERS/06.jpg"></div>
        <div class="slide"><img src="RENDERS/07.jpg"></div>
        <div class="slide"><img src="RENDERS/08.jpg"></div>
        <div class="slide"><img src="RENDERS/09.jpg"></div>
        <div class="slide"><img src="RENDERS/10.png"></div>
        <div class="slide"><img src="RENDERS/11.jpg"></div>
        <div class="slide"><img src="RENDERS/12.jpg"></div>
        <div class="slide"><img src="RENDERS/13.png"></div>
        <div class="slide"><img src="RENDERS/14.png"></div>
        <div class="slide"><img src="RENDERS/15.PNG"></div>
        <div class="slide"><img src="RENDERS/16.PNG"></div>

        <!-- DUPLICADO PARA LOOP -->
        <div class="slide"><img src="RENDERS/01.png"></div>
        <div class="slide"><img src="RENDERS/02.png"></div>
        <div class="slide"><img src="RENDERS/03.png"></div>
        <div class="slide"><img src="RENDERS/04.png"></div>
        <div class="slide"><img src="RENDERS/05.png"></div>
        <div class="slide"><img src="RENDERS/06.jpg"></div>
        <div class="slide"><img src="RENDERS/07.jpg"></div>
        <div class="slide"><img src="RENDERS/08.jpg"></div>
        <div class="slide"><img src="RENDERS/09.jpg"></div>
        <div class="slide"><img src="RENDERS/10.png"></div>
        <div class="slide"><img src="RENDERS/11.jpg"></div>
        <div class="slide"><img src="RENDERS/12.jpg"></div>
        <div class="slide"><img src="RENDERS/13.png"></div>
        <div class="slide"><img src="RENDERS/14.png"></div>
        <div class="slide"><img src="RENDERS/15.PNG"></div>
        <div class="slide"><img src="RENDERS/16.PNG"></div>

    </div>
</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
    <span class="close" onclick="closeLightbox()">✕</span>
    <img id="lightbox-img">
</div>

<script>
const slider = document.getElementById('slider');
const slides = document.querySelectorAll('.slide');
const images = document.querySelectorAll('.slide img');
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');

/* ENFOQUE CENTRO */
function updateCenter(){
    let center = window.innerWidth / 2;

    slides.forEach(slide=>{
        const rect = slide.getBoundingClientRect();
        const slideCenter = rect.left + rect.width / 2;

        if(Math.abs(center - slideCenter) < rect.width / 2){
            slide.classList.add('active');
        } else {
            slide.classList.remove('active');
        }
    });
}

slider.addEventListener('scroll', updateCenter);
window.addEventListener('load', updateCenter);

/* SCROLL INFINITO */
slider.addEventListener('scroll', ()=>{
    if(slider.scrollLeft <= 0){
        slider.scrollLeft = slider.scrollWidth / 2;
    }
    if(slider.scrollLeft >= slider.scrollWidth / 2){
        slider.scrollLeft = slider.scrollWidth / 4;
    }
});

/* LIGHTBOX */
images.forEach(img=>{
    img.addEventListener('click',()=>{
        lightbox.style.display='flex';
        lightboxImg.src = img.src;
    });
});

function closeLightbox(){
    lightbox.style.display='none';
}
</script>

</body>
</html>
