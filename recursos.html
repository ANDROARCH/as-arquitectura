<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANDRO RECURSOS</title>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* BASE */
body{
    font-family: 'Helvetica Neue', sans-serif;
    background:#0d0d0d;
    color:#fff;
}

/* CONTAINER */
.container{
    width:90%;
    max-width:1300px;
    margin:auto;
}

/* TITULO */
.header{
    padding:60px 0 30px;
}

.header h1{
    font-size:2.8rem;
    letter-spacing:3px;
    font-weight:300;
}

.header span{
    font-weight:600;
}

/* FILTROS */
.filters{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:40px;
}

.filters input,
.filters select{
    padding:12px;
    background:#111;
    border:1px solid #222;
    color:#fff;
    border-radius:6px;
    outline:none;
}

.filters input{
    flex:1;
    min-width:200px;
}

.filters button{
    padding:12px 20px;
    background:#fff;
    color:#000;
    border:none;
    border-radius:6px;
    cursor:pointer;
    transition:0.3s;
}

.filters button:hover{
    background:#ddd;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(300px,1fr));
    gap:25px;
}

/* CARD */
.card{
    background:#111;
    border:1px solid #1a1a1a;
    border-radius:10px;
    overflow:hidden;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
    border-color:#333;
}

/* LINK COMPLETO */
.card a{
    text-decoration:none;
    color:inherit;
    display:block;
}

/* IMAGEN RECTANGULAR */
.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

/* INFO */
.card-content{
    padding:18px;
}

.card-content h3{
    font-size:1.1rem;
    margin-bottom:8px;
}

.card-content p{
    font-size:0.9rem;
    color:#aaa;
}

/* TAG */
.tag{
    display:inline-block;
    margin-top:10px;
    font-size:0.75rem;
    color:#ccc;
    border:1px solid #333;
    padding:4px 8px;
    border-radius:4px;
}

/* FOOTER */
.footer{
    text-align:center;
    padding:40px 0;
    color:#666;
    font-size:0.8rem;
}

</style>

</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <h1>ANDRO <span>RECURSOS</span></h1>
    </div>

    <!-- FILTROS -->
    <div class="filters">
        <input type="text" id="search" placeholder="Buscar recursos...">

        <select id="category">
            <option value="">Categoría</option>
            <option value="cad">CAD</option>
            <option value="psd">PSD</option>
            <option value="texturas">Texturas</option>
        </select>

        <button onclick="filtrar()">Buscar</button>
    </div>

    <!-- GRID -->
    <div class="grid" id="grid">

        <!-- CARD -->
        <div class="card" data-category="cad">
            <a href="enlace1.html">
                <img src="img/recurso1.jpg">
                <div class="card-content">
                    <h3>Bloques AutoCAD Pro</h3>
                    <p>Biblioteca optimizada para planos profesionales.</p>
                    <span class="tag">CAD</span>
                </div>
            </a>
        </div>

        <div class="card" data-category="texturas">
            <a href="enlace2.html">
                <img src="img/recurso2.jpg">
                <div class="card-content">
                    <h3>Pack Texturas Realistas</h3>
                    <p>Materiales listos para render de alto nivel.</p>
                    <span class="tag">TEXTURAS</span>
                </div>
            </a>
        </div>

        <div class="card" data-category="psd">
            <a href="enlace3.html">
                <img src="img/recurso3.jpg">
                <div class="card-content">
                    <h3>PSD Render Arquitectónico</h3>
                    <p>Postproducción profesional editable.</p>
                    <span class="tag">PSD</span>
                </div>
            </a>
        </div>

    </div>

</div>

<!-- FOOTER -->
<div class="footer">
    © 2026 ANDROARQ
</div>

<!-- SCRIPT FILTRO -->
<script>
function filtrar(){
    let search = document.getElementById("search").value.toLowerCase();
    let category = document.getElementById("category").value;

    let cards = document.querySelectorAll(".card");

    cards.forEach(card => {
        let text = card.innerText.toLowerCase();
        let cat = card.getAttribute("data-category");

        let matchText = text.includes(search);
        let matchCategory = category === "" || cat === category;

        if(matchText && matchCategory){
            card.style.display = "block";
        } else {
            card.style.display = "none";
        }
    });
}
</script>

</body>
</html>
