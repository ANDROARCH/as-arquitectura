<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANDROARQ - Cursos</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: #0a0a0a;
    color: white;
    overflow: hidden;
}

/* CONTENEDOR */
.section {
    display: flex;
    height: 100vh;
}

/* IMAGEN */
.image {
    width: 70%;
    background: url('TU-RENDER.jpg') center/cover no-repeat;
    position: relative;
    overflow: hidden;
}

/* OVERLAY */
.image::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to right, rgba(0,0,0,0.3), rgba(0,0,0,0.85));
}

/* LIQUID EFFECT */
.liquid {
    position: absolute;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(255,255,255,0.12), transparent 70%);
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
    mix-blend-mode: screen;
}

/* PANEL */
.panel {
    width: 30%;
    padding: 60px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
}

/* GLASS */
.glass {
    position: absolute;
    inset: 0;
    backdrop-filter: blur(25px);
    background: rgba(255,255,255,0.03);
    border-left: 1px solid rgba(255,255,255,0.1);
}

/* CONTENIDO */
.content {
    position: relative;
    z-index: 2;
}

/* TITULO */
.title {
    font-size: 2rem;
    margin-bottom: 10px;
    transition: 0.4s;
}

.subtitle {
    font-size: 0.9rem;
    color: #cfcfcf;
    margin-bottom: 30px;
    transition: 0.4s;
}

/* MENU */
.menu {
    list-style: none;
    margin-bottom: 30px;
}

.menu li {
    margin: 8px 0;
    opacity: 0.5;
    cursor: pointer;
    transition: 0.3s;
}

.menu li.active {
    opacity: 1;
    font-weight: bold;
}

.menu li:hover {
    opacity: 1;
    transform: translateX(5px);
}

/* DETALLES */
.details {
    opacity: 0;
    transform: translateY(15px);
    transition: 0.4s;
}

.details.active {
    opacity: 1;
    transform: translateY(0);
}

.details p {
    font-size: 0.9rem;
    color: #cfcfcf;
    margin-bottom: 10px;
}

/* BOTON */
.btn {
    margin-top: 20px;
    display: inline-block;
    padding: 12px 22px;
    border-radius: 30px;
    border: 1px solid white;
    text-decoration: none;
    color: white;
    transition: 0.3s;
}

.btn:hover {
    background: white;
    color: black;
}

</style>
</head>

<body>

<section class="section">

    <div class="image" id="image">
        <div class="liquid" id="liquid"></div>
    </div>

    <div class="panel">
        <div class="glass"></div>

        <div class="content">

            <h1 class="title" id="title">SKETCHUP</h1>
            <p class="subtitle" id="subtitle">Modelado arquitectónico eficiente</p>

            <ul class="menu">
                <li class="active" onclick="changeCourse(event,'sketchup')">SketchUp</li>
                <li onclick="changeCourse(event,'archicad')">Archicad</li>
                <li onclick="changeCourse(event,'photoshop')">Photoshop</li>
                <li onclick="changeCourse(event,'indesign')">InDesign Básico</li>
                <li onclick="changeCourse(event,'d5')">D5 Render</li>
                <li onclick="changeCourse(event,'lumion')">Lumion</li>
                <li onclick="changeCourse(event,'autocad')">AutoCAD</li>
            </ul>

            <div class="details active" id="details"></div>

            <a href="#" class="btn" id="whatsappBtn">Ver curso</a>

        </div>
    </div>

</section>

<script>

let currentCourse = "sketchup";

const data = {
    sketchup: {
        title: "SKETCHUP",
        subtitle: "Modelado arquitectónico eficiente",
        details: ["Introducción", "Modelado básico", "Componentes", "Escenas"]
    },
    archicad: {
        title: "ARCHICAD",
        subtitle: "Modelado BIM profesional",
        details: ["Interfaz", "Muros", "Planos", "Layouts"]
    },
    photoshop: {
        title: "PHOTOSHOP",
        subtitle: "Postproducción de renders",
        details: ["Color", "Texturas", "Ambiente", "Realismo"]
    },
    indesign: {
        title: "INDESIGN",
        subtitle: "Diagramación arquitectónica",
        details: ["Láminas", "Tipografía", "Portafolio", "Exportación"]
    },
    d5: {
        title: "D5 RENDER",
        subtitle: "Render en tiempo real",
        details: ["Iluminación", "Materiales", "Escenas", "Render"]
    },
    lumion: {
        title: "LUMION",
        subtitle: "Visualización avanzada",
        details: ["Vegetación", "Clima", "Animación", "Render"]
    },
    autocad: {
        title: "AUTOCAD",
        subtitle: "Dibujo técnico",
        details: ["Comandos", "Capas", "Planos", "Impresión"]
    }
};

function changeCourse(event, course) {

    currentCourse = course;

    const selected = data[course];

    document.getElementById("title").innerText = selected.title;
    document.getElementById("subtitle").innerText = selected.subtitle;

    const detailsDiv = document.getElementById("details");
    detailsDiv.classList.remove("active");

    setTimeout(() => {
        detailsDiv.innerHTML = selected.details.map(d => `<p>${d}</p>`).join("");
        detailsDiv.classList.add("active");
    }, 200);

    document.querySelectorAll(".menu li").forEach(li => li.classList.remove("active"));
    event.target.classList.add("active");
}

/* INICIALIZAR */
changeCourse({target: document.querySelector(".menu li")}, "sketchup");

/* LIQUID EFFECT */
const liquid = document.getElementById("liquid");

document.getElementById("image").addEventListener("mousemove", (e) => {
    liquid.style.left = e.clientX + "px";
    liquid.style.top = e.clientY + "px";
});

/* WHATSAPP */
document.getElementById("whatsappBtn").addEventListener("click", function(e){
    e.preventDefault();

    const mensaje = `Hola, deseo aprender ${data[currentCourse].title}`;
    const url = `https://wa.me/593984527298?text=${encodeURIComponent(mensaje)}`;

    window.open(url, "_blank");
});

</script>

</body>
</html>
